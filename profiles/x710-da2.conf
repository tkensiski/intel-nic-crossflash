# Card profile for intel-nic-tool. One file per OEM card type.
# Sourced by crossflash.sh.

# Human-readable name (used in logs and backup filenames).
PROFILE_NAME="Intel X710-DA2"

# PCI device id (the part after 8086:) used to find candidate NICs.
DEVICE_ID="1572"

# SPI flash size in bytes. Flashing an image built for the wrong flash size is
# the #1 cause of a HARD brick, so this is checked against the actual NVM
# backup size before any write happens.
EXPECTED_FLASH_BYTES="8388608"   # 8 MiB

# Target generic Intel NVM image. Must exist in the NVM package ($NVM_DIR).
NVM_IMAGE="X710DA2_9p56_CFGID7p2_J51959_Retail_8M.bin"

# Combined option-ROM image flashed by 'replace-orom' (bootutil -up=combo).
OROM_IMAGE="BootIMG.FLB"
